name: Sync diário Discogs → GitHub Pages

on:
  schedule:
    # Diariamente às 06:00 UTC (03:00 BRT)
    - cron: '0 6 * * *'
  workflow_dispatch:   # permite rodar manualmente pela aba Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # Pipeline completo: Discogs fields → Discogs+Spotify+BPM → HTML/XLSX → Playlists
      - name: Pipeline completo (Discogs + Spotify + BPM + HTML + Playlists)
        env:
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python ci_sync.py

      - name: Commit e push se houver mudanças
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Arquivos gerados / atualizados pelo pipeline
          git add index.html MinhaColecao_DJ.html MinhaColecao_DJ.xlsx
          git add backup_collection_fields.csv
          git add backup_tracks.csv backup_matched_v2.csv backup_bpm.csv backup_final.csv
          git add backup_playlist.txt backup_playlist_dj.txt 2>/dev/null || true
          git diff --cached --quiet && echo "Nada mudou." || \
            git commit -m "chore: sync automático $(date +'%Y-%m-%d')"
          git push
